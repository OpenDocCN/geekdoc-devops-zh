- en: Doing a soft reset
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 进行软重置
- en: 原文：[http://jwiegley.github.io/git-from-the-bottom-up/3-Reset/3-doing-a-soft-reset.html](http://jwiegley.github.io/git-from-the-bottom-up/3-Reset/3-doing-a-soft-reset.html)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[http://jwiegley.github.io/git-from-the-bottom-up/3-Reset/3-doing-a-soft-reset.html](http://jwiegley.github.io/git-from-the-bottom-up/3-Reset/3-doing-a-soft-reset.html)'
- en: 'If you use the `--soft` option to `reset`, this is the same as simply changing
    your HEAD reference to a different commit. Your working tree changes are left
    untouched. This means the following two commands are equivalent:'
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你使用`--soft`选项来`reset`，这相当于只是将你的HEAD引用更改为不同的提交。你的工作树更改保持不变。这意味着以下两个命令是等效的：
- en: '[PRE0]'
  id: totrans-3
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: In both cases, your working tree now sits on top of an older HEAD, so you should
    see more changes if you run `status`. It’s not that your files have been changed,
    simply that they are now being compared against an older version. It can give
    you a chance to create a new commit in place of the old one. In fact, if the commit
    you want to change is the most recent one checked in, you can use `commit --amend`
    to add your latest changes to the last commit as if you’d done them together.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 在这两种情况下，你的工作树现在位于一个较旧的HEAD之上，所以如果你运行`status`，你应该会看到更多更改。这并不是你的文件已经改变，而是它们现在正在与一个较旧的版本进行比较。这可能会给你一个机会，用新的提交替换旧的提交。实际上，如果你想要更改的提交是最近一次提交的，你可以使用`commit
    --amend`将你的最新更改添加到最后的提交中，就像你一起做了这些更改一样。
- en: 'But please note: if you have downstream consumers, and they’ve done work on
    top of your previous head — the one you threw away — changing HEAD like this will
    force a merge to happen automatically after their next pull. Below is what your
    tree would look like after a soft reset and a new commit:'
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 但请注意：如果你有下游消费者，并且他们已经在你丢弃的前一个HEAD之上进行了工作——即你丢弃的那个——以这种方式更改HEAD将强制在他们下一次拉取后自动发生合并。以下是软重置和新的提交之后的树结构：
- en: '![Soft Reset Commit](../Images/e0b7a5585b43fae3dcc3210ae4bcf821.png)'
  id: totrans-6
  prefs: []
  type: TYPE_IMG
  zh: '![软重置提交](../Images/e0b7a5585b43fae3dcc3210ae4bcf821.png)'
- en: 'And here’s what your consumer’s HEAD would look like after they pulled again,
    with colors to show how the various commits match up:'
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 这里展示了消费者再次拉取后，他们的HEAD看起来会是什么样子，颜色显示了各种提交如何匹配：
- en: '![Soft Reset Pull](../Images/3555c82a5ec02914760163e8a78ae14c.png)'
  id: totrans-8
  prefs: []
  type: TYPE_IMG
  zh: '![软重置拉取](../Images/3555c82a5ec02914760163e8a78ae14c.png)'
