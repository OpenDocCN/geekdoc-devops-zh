- en: Introduction
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[http://jwiegley.github.io/git-from-the-bottom-up/](http://jwiegley.github.io/git-from-the-bottom-up/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Welcome to the world of Git. I hope this document will help to advance your
    understanding of this powerful content tracking system, and reveal a bit of the
    simplicity underlying it — however dizzying its array of options may seem from
    the outside.
  prefs: []
  type: TYPE_NORMAL
- en: 'Before we dive in, there are a few terms which should be mentioned first, since
    they’ll appear repeatedly throughout this text:'
  prefs: []
  type: TYPE_NORMAL
- en: '**repository** — A **repository** is a collection of *commits*, each of which
    is an archive of what the project’s *working tree* looked like at a past date,
    whether on your machine or someone else’s. It also defines HEAD (see below), which
    identifies the branch or commit the current working tree stemmed from. Lastly,
    it contains a set of *branches* and *tags*, to identify certain commits by name.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**the index** — Unlike other, similar tools you may have used, Git does not
    commit changes directly from the *working tree* into the *repository*. Instead,
    changes are first registered in something called **the index**. Think of it as
    a way of “confirming” your changes, one by one, before doing a commit (which records
    all your approved changes at once). Some find it helpful to call it instead as
    the “staging area”, instead of the index.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**working tree** — A **working tree** is any directory on your filesystem which
    has a *repository* associated with it (typically indicated by the presence of
    a sub-directory within it named `.git`.). It includes all the files and sub-directories
    in that directory.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**commit** — A **commit** is a snapshot of your working tree at some point
    in time. The state of HEAD (see below) at the time your commit is made becomes
    that commit’s parent. This is what creates the notion of a “revision history”.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**branch** — A **branch** is just a name for a commit (and much more will be
    said about commits in a moment), also called a reference. It’s the parentage of
    a commit which defines its history, and thus the typical notion of a “branch of
    development”.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**tag** — A **tag** is also a name for a commit, similar to a *branch*, except
    that it always names the same commit, and can have its own description text.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**master** — The mainline of development in most repositories is done on a
    branch called “**master**”. Although this is a typical default, it is in no way
    special.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**HEAD** — **HEAD** is used by your repository to define what is currently
    checked out:'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: If you checkout a branch, HEAD symbolically refers to that branch, indicating
    that the branch name should be updated after the next commit operation.
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: If you checkout a specific commit, HEAD refers to that commit only. This is
    referred to as a detached *HEAD*, and occurs, for example, if you check out a
    tag name.
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: 'The usual flow of events is this: After creating a repository, your work is
    done in the working tree. Once your work reaches a significant point — the completion
    of a bug, the end of the working day, a moment when everything compiles — you
    add your changes successively to the index. Once the index contains everything
    you intend to commit, you record its content in the repository. Here’s a simple
    diagram that shows a typical project’s life-cycle:'
  prefs: []
  type: TYPE_NORMAL
- en: '![Project Lifecycle](../Images/f735ea9324b1123a2fd2c9e10eb9f7de.png)'
  prefs: []
  type: TYPE_IMG
- en: With this basic picture in mind, the following sections shall attempt to describe
    how each of these different entities is important to the operation of Git.
  prefs: []
  type: TYPE_NORMAL
