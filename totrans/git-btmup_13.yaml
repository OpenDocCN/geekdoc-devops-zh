  id: totrans-11
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: 'Now if I want to selectively disable the first patch to test only the second,
    it’s very straightforward:'
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我如果想选择性地禁用第一个补丁以仅测试第二个，那就非常直接：
- en: '[PRE3]'
  id: totrans-13
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: This is definitely easier than creating temporary branches and using `cherry-pick`
    to apply specific commit ids, followed by deleting the temporary branch.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 这肯定比创建临时分支并使用 `cherry-pick` 应用特定的提交 ID，然后删除临时分支要简单得多。
