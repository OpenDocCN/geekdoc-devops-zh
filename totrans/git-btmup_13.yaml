  id: totrans-9
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: 'Surely there has to be a better way! With `stg` I can queue up both patches
    and then re-apply them in whatever order I like, for independent or combined testing,
    etc. Here’s how I’d queue the same two patches from the previous example, using
    `stg`:'
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 当然，肯定有更好的方法！使用 `stg`，我可以排队等待多个补丁，然后按我喜欢的顺序重新应用它们，用于独立或组合测试等。以下是我如何使用 `stg` 排队之前示例中的相同两个补丁的示例：
