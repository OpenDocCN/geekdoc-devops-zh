- en: Branching and the power of rebase
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[http://jwiegley.github.io/git-from-the-bottom-up/1-Repository/7-branching-and-the-power-of-rebase.html](http://jwiegley.github.io/git-from-the-bottom-up/1-Repository/7-branching-and-the-power-of-rebase.html)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'One of Git’s most capable commands for manipulating commits is the innocently-named
    rebase command. Basically, every branch you work from has one or more “base commits”:
    the commits that branch was born from. Take the following typical scenario, for
    example. Note that the arrows point back in time because each commit references
    its parent(s), but not its children. Therefore, the D and Z commits represent
    the heads of their respective branches:'
  prefs: []
  type: TYPE_NORMAL
- en: '![Branching](../Images/6374181e3232d83f349f4fb213dce8b5.png)'
  prefs: []
  type: TYPE_IMG
- en: 'In this case, running branch would show two “heads”: `D` and `Z`, with the
    common parent of both branches being A. The output of show-branch shows us just
    this information:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: 'Reading this output takes a little getting used to, but essentially it’s no
    different from the diagram above. Here’s what it tells us:'
  prefs: []
  type: TYPE_NORMAL
- en: The branch we’re on experienced its first divergence at commit `A` (also known
    as commit `D~3`, and even `Z~4` if you feel so inclined). The syntax `commit^`
    is used to refer to the parent of a commit, while `commit~3` refers to its third
    parent, or great-grandparent.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Reading from bottom to top, the first column (the plus signs) shows a divergent
    branch named `Z` with four commits: `W`, `X`, `Y` and `Z`.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'The second column (the asterisks) show the commits which happened on the current
    branch, namely three commits: `B`, `C` and `D`.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The top of the output, separated from the bottom by a dividing line, identifies
    the branches displayed, which column their commits are labelled by, and the character
    used for the labeling.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The action we’d like to perform is to bring the working branch `Z` back up to
    speed with the main branch, `D`. In other words, we want to incorporate the work
    from `B`, `C`, and `D` into `Z`.
  prefs: []
  type: TYPE_NORMAL
- en: 'In other version control systems this sort of thing can only be done using
    a “branch merge”. In fact, a branch merge can still be done in Git, using `merge`,
    and remains needful in the case where `Z` is a published branch and we don’t want
    to alter its commit history. Here are the commands to run:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: 'This is what the repository looks like afterward:'
  prefs: []
  type: TYPE_NORMAL
- en: '![Branch Merge](../Images/13ab185018c97f6988530842fe1685e6.png)'
  prefs: []
  type: TYPE_IMG
- en: 'If we checked out the `Z` branch now, it would contain the contents of the
    previous `Z` (now referenceable as `Z^`), merged with the contents of `D`. (Though
    note: a real merge operation would have required resolving any conflicts between
    the states of `D` and `Z`).'
  prefs: []
  type: TYPE_NORMAL
- en: 'Although the new `Z` now contains the changes from `D`, it also includes a
    new commit to represent the merging of `Z` with `D`: the commit now shown as `Z’`.
    This commit doesn’t add anything new, but represents the work done to bring `D`
    and `Z` together. In a sense it’s a “meta-commit”, because its contents are related
    to work done solely in the repository, and not to new work done in the working
    tree.'
  prefs: []
  type: TYPE_NORMAL
- en: 'There is a way, however, to transplant the `Z` branch straight onto `D`, effectively
    moving it forward in time: by using the powerful rebase command. Here’s the graph
    we’re aiming for:'
  prefs: []
  type: TYPE_NORMAL
- en: '![Rebase](../Images/6df5c1b17f3b465b2127aac4c4aa8a6c.png)'
  prefs: []
  type: TYPE_IMG
- en: 'This state of affairs most directly represents what we’d like done: for our
    local, development branch `Z` to be based on the latest work in the main branch
    `D`. That’s why the command is called “rebase”, because it changes the base commit
    of the branch it’s run from. If you run it repeatedly, you can carry forward a
    set of patches indefinitely, always staying up-to-date with the main branch, but
    without adding unnecessary merge commits to your development branch. Here are
    the commands to run, compared to the merge operation performed above:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  prefs: []
  type: TYPE_PRE
- en: Why is this only for local branches? Because every time you rebase, you’re potentially
    changing every commit in the branch. Earlier, when `W` was based on `A`, it contained
    only the changes needed to transform `A` into `W`. After running rebase, however,
    `W` will be rewritten to contain the changes necessary to transform `D` into `W’`.
    Even the transformation from `W` to `X` is changed, because `A+W+X` is now `D+W’+X’`
    — and so on. If this were a branch whose changes are seen by other people, and
    any of your downstream consumers had created their own local branches off of `Z`,
    their branches would now point to the old `Z`, not the new `Z’`.
  prefs: []
  type: TYPE_NORMAL
- en: 'Generally, the following rule of thumb can be used: Use rebase if you have
    a local branch with no other branches that have branched off from it, and use
    merge for all other cases. merge is also useful when you’re ready to pull your
    local branch’s changes back into the main branch.'
  prefs: []
  type: TYPE_NORMAL
