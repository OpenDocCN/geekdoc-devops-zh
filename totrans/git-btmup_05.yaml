- en: Blobs are stored in trees
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: Blob存储在树中
- en: 原文：[http://jwiegley.github.io/git-from-the-bottom-up/1-Repository/3-blobs-are-stored-in-trees.html](http://jwiegley.github.io/git-from-the-bottom-up/1-Repository/3-blobs-are-stored-in-trees.html)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[http://jwiegley.github.io/git-from-the-bottom-up/1-Repository/3-blobs-are-stored-in-trees.html](http://jwiegley.github.io/git-from-the-bottom-up/1-Repository/3-blobs-are-stored-in-trees.html)'
- en: The contents of your files are stored in blobs, but those blobs are pretty featureless.
    They have no name, no structure — they’re just “blobs”, after all.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 你的文件内容存储在blob中，但这些blob功能相当有限。它们没有名字，没有结构——毕竟它们只是“blob”。
- en: 'In order for Git to represent the structure and naming of your files, it attaches
    blobs as leaf nodes within a tree. Now, I can’t discover which tree(s) a blob
    lives in just by looking at it, since it may have many, many owners. But I know
    it must live somewhere within the tree held by the commit I just made:'
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 为了让Git表示你的文件的结构和命名，它将blob作为树中的叶节点附加。现在，仅通过查看它，我无法发现blob所在的树，因为它可能有成千上万的拥有者。但我知道它必须存在于我刚刚做出的提交持有的树中：
- en: '[PRE0]'
  id: totrans-4
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: 'There it is! This first commit added my greeting file to the repository. This
    commit contains one Git tree, which has a single leaf: the greeting content’s
    blob.'
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 就在这里！这个第一个提交将我的问候文件添加到了仓库中。这个提交包含一个Git树，它只有一个叶节点：问候内容的blob。
- en: 'Although I can look at the tree containing my blob by passing HEAD to `ls-tree`,
    I haven’t yet seen the underlying tree object referenced by that commit. Here
    are a few other commands to highlight that difference and thus discover my tree:'
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管我可以通过将HEAD传递给`ls-tree`来查看包含我的blob的树，但我还没有看到该提交引用的底层树对象。这里有一些其他命令来强调这种差异，并发现我的树：
- en: '[PRE1]'
  id: totrans-7
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: The first command decodes the HEAD alias into the commit it references, the
    second verifies its type, while the third command shows the hash id of the tree
    held by that commit, as well as the other information stored in the commit object.
    The hash id for the commit is unique to my repository — because it includes my
    name and the date when I made the commit — but the hash id for the tree should
    be common between your example and mine, containing as it does the same blob under
    the same name.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 第一个命令将HEAD别名解码为它引用的提交，第二个命令验证其类型，而第三个命令显示了该提交持有的树的哈希ID，以及存储在提交对象中的其他信息。提交的哈希ID对于我的仓库是唯一的——因为它包括我提交时的名字和日期——但树的哈希ID应该在你的示例和我的示例之间是通用的，因为它包含相同名称下的相同blob。
- en: 'Let’s verify that this is indeed the same tree object:'
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们验证这确实是一个相同的树对象：
- en: '[PRE2]'
  id: totrans-10
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: 'There you have it: my repository contains a single commit, which references
    a tree that holds a blob — the blob containing the contents I want to record.
    There’s one more command I can run to verify that this is indeed the case:'
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 就这样：我的仓库中只有一个提交，它引用了一个包含blob的树——包含我要记录的内容的blob。我还可以运行一个额外的命令来验证这一点：
- en: '[PRE3]'
  id: totrans-12
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: 'From this output I see that the whole of my repo contains three objects, each
    of whose hash id has appeared in the preceding examples. Let’s take one last look
    at the types of these objects, just to satisfy curiosity:'
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 从这个输出中，我看到我的整个仓库包含三个对象，每个对象的哈希ID都出现在前面的例子中。让我们再最后看看这些对象的类型，以满足好奇心：
- en: '[PRE4]'
  id: totrans-14
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: I could have used the show command at this point to view the concise contents
    of each of these objects, but I’ll leave that as an exercise to the reader.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个时刻，我本可以使用show命令来查看这些对象的简洁内容，但我将把这个作为读者的练习。
